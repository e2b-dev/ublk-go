version: "2"

run:
  build-tags:
    - integration

formatters:
  enable:
    - gofumpt

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  exclusions:
    rules:
      - path: "_test\\.go$"
        linters: [errcheck]
      - path: "example/"
        linters: [errcheck]

