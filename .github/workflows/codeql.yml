name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - uses: github/codeql-action/init@v3.35.2
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3.35.2
      - uses: github/codeql-action/analyze@v3.35.2
