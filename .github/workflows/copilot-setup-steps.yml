name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GOLANGCI_LINT_VERSION: v2.11.4
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Install repo tooling
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends e2fsprogs kmod
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go env -w GOFLAGS=-tags=integration
      - name: Prime Go module cache
        run: go mod download
      - name: Load ublk kernel module
        run: |
          set -eux
          if ! sudo modprobe ublk_drv 2>/dev/null; then
            sudo apt-get install -y --no-install-recommends "linux-modules-extra-$(uname -r)"
            sudo modprobe ublk_drv
          fi
          ls -l /dev/ublk-control
