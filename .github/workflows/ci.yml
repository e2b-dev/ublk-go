name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - uses: golangci/golangci-lint-action@v6

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test -v -count=1 -race ./ublk/uring/ ./ublk/
        env:
          GOARCH: ${{ matrix.arch }}
      - name: Integration tests (best-effort)
        if: matrix.arch == 'amd64'
        run: |
          sudo modprobe ublk_drv 2>/dev/null || true
          if [ -e /dev/ublk-control ]; then
            go test -c -o /tmp/ublk.test ./ublk/
            sudo /tmp/ublk.test -test.v -test.timeout=120s
          else
            echo "ublk_drv not available, skipping integration tests"
          fi
