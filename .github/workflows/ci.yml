name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    env:
      GOLANGCI_LINT_VERSION: v2.11.4
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Check formatting
        run: make lint-fmt
      - name: Check go.mod tidy
        run: make lint-tidy
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/${{ env.GOLANGCI_LINT_VERSION }}/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: make lint-vet

  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Build library
        # Catches compile regressions in arch-conditional code (unsafe
        # pointer arithmetic, struct layout) without waiting for tests.
        run: go build ./ublk/...
      - name: Build integration test binary (compile-only)
        # go test -c with -tags=integration forces the test files to
        # compile even though this job doesn't execute them.
        run: go test -c -tags=integration -o /dev/null ./ublk/

  test-unit:
    name: Unit tests (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Run unit tests (race + coverage)
        run: |
          set -eux
          mkdir -p coverage
          go test -v -count=1 -race -coverprofile=coverage/unit.out -coverpkg=./ublk/... ./ublk/uring/ ./ublk/
      - name: Coverage summary
        if: matrix.arch == 'amd64'
        run: |
          set -eu
          go tool cover -html=coverage/unit.out -o coverage/unit.html
          {
            echo "## Unit coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage/unit.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage/unit.out | tail -1
      - name: Upload unit coverage artifact
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 30
      - name: Upload unit coverage to Codecov
        if: matrix.arch == 'amd64'
        uses: codecov/codecov-action@v5.5.4
        with:
          files: coverage/unit.out
          flags: unit
          fail_ci_if_error: false
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-integration:
    name: Integration tests (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Load ublk_drv kernel module
        run: |
          set -eux
          sudo modprobe ublk_drv
          ls -l /dev/ublk-control
      - name: Run integration tests (race + coverage)
        run: |
          set -eux
          mkdir -p coverage
          go test -c -race -tags=integration -coverpkg=./ublk/... -o /tmp/ublk.test ./ublk/
          sudo /tmp/ublk.test -test.v -test.timeout=300s -test.coverprofile=coverage/integration.out
          sudo chmod 644 coverage/integration.out
      - name: Coverage summary
        if: matrix.arch == 'amd64'
        run: |
          set -eu
          go tool cover -html=coverage/integration.out -o coverage/integration.html
          {
            echo "## Integration coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage/integration.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage/integration.out | tail -1
      - name: Upload integration coverage artifact
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-integration
          path: coverage/
          retention-days: 30
      - name: Upload integration coverage to Codecov
        if: matrix.arch == 'amd64'
        uses: codecov/codecov-action@v5.5.4
        with:
          files: coverage/integration.out
          flags: integration
          fail_ci_if_error: false
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
