name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    env:
      GOLANGCI_LINT_VERSION: v2.11.4
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Check formatting
        run: make lint-fmt
      - name: Check go.mod tidy
        run: make lint-tidy
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/${{ env.GOLANGCI_LINT_VERSION }}/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: make lint-vet

  test:
    name: Test (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Unit tests (race)
        run: make test-unit
      - name: Integration tests
        run: |
          sudo modprobe ublk_drv 2>/dev/null || true
          if [ -e /dev/ublk-control ]; then
            make test-integration
          else
            echo "ublk_drv not available, skipping"
          fi
