name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - uses: wistia/parse-tool-versions@v2.1.1
      - uses: golangci/golangci-lint-action@v8
        with:
          version: "v${{ env.GOLANGCI_LINT }}"
          verify: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test -v -count=1 -race ./ublk/uring/ ./ublk/
      - name: Build for arm64
        run: GOARCH=arm64 go build ./...
      - name: Integration tests (best-effort)
        run: |
          sudo modprobe ublk_drv 2>/dev/null || true
          if [ -e /dev/ublk-control ]; then
            go test -c -o /tmp/ublk.test ./ublk/
            sudo /tmp/ublk.test -test.v -test.timeout=120s
          else
            echo "ublk_drv not available, skipping"
          fi
