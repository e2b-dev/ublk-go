name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    env:
      GOLANGCI_LINT_VERSION: v2.11.4
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Check formatting
        run: make lint-fmt
      - name: Check go.mod tidy
        run: make lint-tidy
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/${{ env.GOLANGCI_LINT_VERSION }}/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: make lint-vet

  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Build library
        # Catches compile regressions in arch-conditional code (unsafe
        # pointer arithmetic, struct layout) without waiting for tests.
        run: go build ./ublk/...
      - name: Build integration test binary (compile-only)
        # go test -c with -tags=integration forces the test files to
        # compile even though this job doesn't execute them.
        run: go test -c -tags=integration -o /dev/null ./ublk/

  test-unit:
    name: Unit tests (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Run unit tests (race + coverage)
        run: |
          set -eux
          mkdir -p coverage
          go test -v -count=1 -race -coverprofile=coverage/unit.out -coverpkg=./ublk/... ./ublk/uring/ ./ublk/
      # Short coverage-guided mutation pass on top of the seed corpus
      # (which already ran above as part of `go test`). 10s/target
      # keeps CI cost low while still exercising the mutator. Use
      # `make fuzz-uring` (default 30s/target) or FUZZTIME=2m for
      # longer local campaigns.
      - name: Fuzz uring (short)
        run: |
          set -eux
          go test -run=^$ -fuzz=FuzzRingSubmit -fuzztime=10s ./ublk/uring/
          go test -run=^$ -fuzz=FuzzRingCancel -fuzztime=10s ./ublk/uring/
      - name: Upload fuzz crashers (if any)
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fuzz-uring-crashers-${{ matrix.arch }}
          path: ublk/uring/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 14
      - name: Coverage summary
        if: matrix.arch == 'amd64'
        run: |
          set -eu
          go tool cover -html=coverage/unit.out -o coverage/unit.html
          {
            echo "## Unit coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage/unit.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage/unit.out | tail -1
      - name: Upload unit coverage artifact
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 30

  test-integration:
    name: Integration tests (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Load ublk_drv kernel module
        # GitHub-hosted runners ship a minimal kernel image; ublk_drv lives in
        # linux-modules-extra-$(uname -r). Try modprobe first (fast path for
        # future images that bundle it), fall back to installing the extras
        # package only when needed.
        run: |
          set -eux
          if ! sudo modprobe ublk_drv 2>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends "linux-modules-extra-$(uname -r)"
            sudo modprobe ublk_drv
          fi
          ls -l /dev/ublk-control
      - name: Run integration tests (race + coverage)
        run: |
          set -eux
          mkdir -p coverage
          go test -c -race -tags=integration -coverpkg=./ublk/... -o /tmp/ublk.test ./ublk/
          sudo /tmp/ublk.test -test.v -test.timeout=300s -test.coverprofile=coverage/integration.out
          sudo chmod 644 coverage/integration.out
      - name: Coverage summary
        if: matrix.arch == 'amd64'
        run: |
          set -eu
          go tool cover -html=coverage/integration.out -o coverage/integration.html
          {
            echo "## Integration coverage"
            echo ""
            echo '```'
            go tool cover -func=coverage/integration.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage/integration.out | tail -1
      - name: Upload integration coverage artifact
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-integration
          path: coverage/
          retention-days: 30

  coverage:
    name: Combined coverage
    needs: [test-unit, test-integration]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25"
          check-latest: false
      - name: Download unit + integration coverage artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true
      - name: Merge coverage profiles
        # gocovmerge sums counts for overlapping line ranges across
        # profiles (concatenating atomic-mode files directly would
        # double-count shared lines).
        run: |
          set -eu
          go install github.com/wadey/gocovmerge@latest
          "$(go env GOPATH)/bin/gocovmerge" coverage/unit.out coverage/integration.out > coverage/combined.out
          go tool cover -html=coverage/combined.out -o coverage/combined.html
      - name: Combined coverage summary
        run: |
          set -eu
          {
            echo "## Combined coverage (unit + integration merged)"
            echo ""
            echo '```'
            go tool cover -func=coverage/combined.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage/combined.out | tail -1
      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-combined
          path: coverage/combined.*
          retention-days: 30
      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          set -eu
          # Extract the total coverage percentage (e.g. "79.3%")
          pct=$(go tool cover -func=coverage/combined.out | tail -1 | awk '{print $NF}' | tr -d '%')

          # Sanity-check: pct must look like a number (e.g. "79.3").
          if ! echo "$pct" | grep -qE '^[0-9]+(\.[0-9]+)?$'; then
            echo "ERROR: unexpected coverage value: '$pct'" >&2
            exit 1
          fi

          # Pick badge colour based on coverage level.
          if   awk "BEGIN{exit!($pct>=80)}"; then color="brightgreen"
          elif awk "BEGIN{exit!($pct>=60)}"; then color="green"
          elif awk "BEGIN{exit!($pct>=40)}"; then color="yellow"
          else                                   color="red"
          fi

          # Write a shields.io JSON endpoint file.
          mkdir -p badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > badge/coverage.json
      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badge
          destination_dir: badge
          keep_files: true
