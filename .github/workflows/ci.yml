name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: make lint-fmt
      - name: Check go.mod tidy
        run: make lint-tidy
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Run golangci-lint
        run: make lint-vet

  test:
    name: Test (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version-file: go.mod
      - name: Unit tests (race)
        run: make test-unit
      - name: Integration tests
        run: |
          sudo modprobe ublk_drv 2>/dev/null || true
          if [ -e /dev/ublk-control ]; then
            make test-integration
          else
            echo "ublk_drv not available, skipping"
          fi
