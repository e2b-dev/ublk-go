name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check go.mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Unit tests (race)
        run: go test -v -count=1 -race ./ublk/uring/ ./ublk/
      - name: Integration tests
        run: |
          sudo modprobe ublk_drv 2>/dev/null || true
          if [ -e /dev/ublk-control ]; then
            go test -c -race -o /tmp/ublk.test ./ublk/
            sudo /tmp/ublk.test -test.v -test.timeout=120s
          else
            echo "ublk_drv not available, skipping"
          fi
