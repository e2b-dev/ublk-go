# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: auto
        threshold: 5%

ignore:
  - "example/**/*"
  - "**/*_test.go"
  - "**/integration_test.go"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
