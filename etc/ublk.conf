# /etc/modprobe.d/ublk.conf
#
# Raise the ublk_drv device limit from its default 64 to something
# that accommodates real workloads. The counter covers all devices
# (privileged and unprivileged) and increments on every ADD_DEV.
# Theoretical max is UBLK_MINORS (~1M); 4096 is a comfortable
# production default.
options ublk_drv ublks_max=4096
